function App() {
  const [activePhase, setActivePhase] = useState(0);
  const [activeLesson, setActiveLesson] = useState(null);
  const [view, setView] = useState("curriculum");
  const [completed, setCompleted] = useState({});
  const [showExp, setShowExp] = useState(true);
  const [copied, setCopied] = useState(null);
  const [quiz, setQuiz] = useState({active:false,q:0,score:0,answered:null});
  const [code, setCode] = useState("");
  const [output, setOutput] = useState("");
  const [running, setRunning] = useState(false);
  const [pyReady, setPyReady] = useState(false);
  const [chatOpen, setChatOpen] = useState(false);
  const [chatMessages, setChatMessages] = useState([{role:"assistant",text:"👋 Hi! I'm your Python tutor. Ask me anything about Python or the lesson you're on!"}]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem("gemini_key") || "");
  const [anthropicKey, setAnthropicKey] = useState(() => localStorage.getItem("anthropic_key") || "");
  const [openaiKey, setOpenaiKey] = useState(() => localStorage.getItem("openai_key") || "");
  const [keyInput, setKeyInput] = useState({gemini:"", anthropic:"", openai:""});
  const pyodideRef = useRef(null);
  const textareaRef = useRef(null);
  const chatEndRef = useRef(null);

  const totalLessons = curriculum.reduce((a,p) => a + p.lessons.length, 0);
  const doneCount = Object.keys(completed).length;
  const pct = Math.round((doneCount/totalLessons)*100);
  const phase = curriculum[activePhase];

  useEffect(() => {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js";
    script.onload = async () => {
      try {
        const py = await window.loadPyodide({indexURL:"https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"});
        pyodideRef.current = py;
        setPyReady(true);
      } catch(e) { console.error(e); }
    };
    document.head.appendChild(script);
  }, []);

  const runCode = async () => {
    if (!pyodideRef.current || !code.trim()) return;
    setRunning(true); setOutput("");
    try {
      await pyodideRef.current.runPythonAsync(`
import sys
from io import StringIO
_buf = StringIO()
sys.stdout = _buf
sys.stderr = _buf
try:
${code.split("\n").map(l => "    "+l).join("\n")}
except Exception as e:
    print(f"❌ Error: {e}")
finally:
    sys.stdout = sys.__stdout__
    sys.stderr = sys.__stderr__
`);
      const result = pyodideRef.current.runPython(`_buf.getvalue()`);
      setOutput(result || "✅ Code ran successfully (no output)");
    } catch(e) { setOutput(`❌ ${e.message}`); }
    setRunning(false);
  };

  const loadLessonCode = (lesson) => {
    setCode(lesson.lines.filter(l=>l.code!==null).map(l=>l.code).join("\n").trim());
    setOutput("");
  };

  const copyCode = (text, id) => {
    navigator.clipboard.writeText(text).catch(()=>{});
    setCopied(id); setTimeout(()=>setCopied(null),1500);
  };

  const handleTabKey = (e) => {
    if (e.key==="Tab") {
      e.preventDefault();
      const s=e.target.selectionStart, end=e.target.selectionEnd;
      const newCode = code.substring(0,s)+"    "+code.substring(end);
      setCode(newCode);
      setTimeout(()=>{ if(textareaRef.current){textareaRef.current.selectionStart=textareaRef.current.selectionEnd=s+4;}},0);
    }
  };

  const saveKeys = () => {
    if (keyInput.gemini) { localStorage.setItem("gemini_key", keyInput.gemini); setGeminiKey(keyInput.gemini); }
    if (keyInput.anthropic) { localStorage.setItem("anthropic_key", keyInput.anthropic); setAnthropicKey(keyInput.anthropic); }
    if (keyInput.openai) { localStorage.setItem("openai_key", keyInput.openai); setOpenaiKey(keyInput.openai); }
    setKeyInput({gemini:"", anthropic:"", openai:""});
    setShowSettings(false);
  };

  const sendChat = async () => {
    if (!chatInput.trim() || chatLoading) return;
    const userMsg = chatInput.trim();
    const activeKey = geminiKey || openaiKey || anthropicKey;
    if (!activeKey) { setShowSettings(true); return; }
    setChatInput("");
    setChatMessages(prev=>[...prev,{role:"user",text:userMsg}]);
    setChatLoading(true);
    const lessonCtx = activeLesson ? `Student is on lesson: "${activeLesson.title}" — ${activeLesson.project}.` : "Student is browsing the Python Bootcamp.";
    const systemPrompt = `You are a friendly Python tutor in a bootcamp app. ${lessonCtx} Be concise (under 120 words). Use short code examples when helpful. Be encouraging.`;
    const history = chatMessages.slice(1).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    try {
      let reply = "";
      if (geminiKey) {
        const geminiMessages = [...history,{role:"user",content:userMsg}].map(m=>({role:m.role==="assistant"?"model":"user",parts:[{text:m.content}]}));
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`,{
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt}]},contents:geminiMessages,generationConfig:{maxOutputTokens:400}})
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
      } else if (openaiKey) {
        const res = await fetch("https://api.openai.com/v1/chat/completions",{
          method:"POST", headers:{"Content-Type":"application/json","Authorization":`Bearer ${openaiKey}`},
          body:JSON.stringify({model:"gpt-4o-mini",max_tokens:400,messages:[{role:"system",content:systemPrompt},...history,{role:"user",content:userMsg}]})
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        reply = data?.choices?.[0]?.message?.content || "No response";
      } else if (anthropicKey) {
        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST", headers:{"Content-Type":"application/json","x-api-key":anthropicKey,"anthropic-version":"2023-06-01"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:400,system:systemPrompt,messages:[...history,{role:"user",content:userMsg}]})
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message);
        reply = data?.content?.[0]?.text || "No response";
      }
      setChatMessages(prev=>[...prev,{role:"assistant",text:reply}]);
    } catch(err) {
      setChatMessages(prev=>[...prev,{role:"assistant",text:`❌ ${err.message}`}]);
    }
    setChatLoading(false);
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  const hasKey = geminiKey || openaiKey || anthropicKey;
  const activeProvider = geminiKey ? "Gemini" : openaiKey ? "OpenAI" : anthropicKey ? "Anthropic" : null;

  return (
    <div style={{fontFamily:"'JetBrains Mono','Courier New',monospace",background:"#1e1e2e",height:"100vh",color:"#e2e8ef",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{background:"#13131f",borderBottom:"1px solid #333350",padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>🐍</span>
          <div>
            <div style={{fontSize:13,fontWeight:"bold",color:"#00D084",letterSpacing:1}}>PYTHON BOOTCAMP</div>
            <div style={{fontSize:9,color:"#4a5568"}}>Line-by-Line • Built-in Editor • Run Code in Browser</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{fontSize:10,color:pyReady?"#00D084":"#F59E0B"}}>{pyReady?"🟢 Python Ready":"⏳ Loading..."}</div>
          <button onClick={()=>setShowSettings(true)} style={{background:"#333350",color:hasKey?"#00D084":"#F59E0B",border:"none",borderRadius:5,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>
            {hasKey?`⚙️ ${activeProvider} ✅`:"⚙️ Setup AI"}
          </button>
          <div style={{background:"#252538",borderRadius:20,padding:"2px 8px",fontSize:10,color:"#00D084"}}>{doneCount}/{totalLessons} ✅</div>
          <div style={{background:"#252538",borderRadius:20,padding:"2px 8px",fontSize:10,color:"#F59E0B"}}>{pct}%</div>
        </div>
      </div>

      {/* Progress */}
      <div style={{height:2,background:"#21262d",flexShrink:0}}>
        <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#00D084,#4ECDC4)",transition:"width 0.5s"}}/>
      </div>

      {/* Top Nav */}
      <div style={{background:"#13131f",borderBottom:"1px solid #333350",padding:"5px 16px",display:"flex",gap:6,flexShrink:0}}>
        {[{id:"curriculum",label:"📚 Lessons"},{id:"cheatsheet",label:"📋 Cheat Sheet"},{id:"quiz",label:"🧠 Quiz"}].map(t=>(
          <button key={t.id} onClick={()=>{setView(t.id);setActiveLesson(null);}}
            style={{background:view===t.id?"#00D084":"transparent",color:view===t.id?"#000":"#a0aec0",border:`1px solid ${view===t.id?"#00D084":"#333350"}`,borderRadius:5,padding:"4px 10px",fontSize:10,cursor:"pointer",fontWeight:view===t.id?"bold":"normal"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Body */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* Sidebar */}
        {view==="curriculum" && (
          <div style={{width:185,borderRight:"1px solid #333350",overflowY:"auto",flexShrink:0,background:"#13131f"}}>
            {curriculum.map((p,idx)=>(
              <div key={p.id}>
                <button onClick={()=>{setActivePhase(idx);setActiveLesson(null);}}
                  style={{width:"100%",background:activePhase===idx?"#252538":"transparent",border:"none",borderLeft:`2px solid ${activePhase===idx?p.color:"transparent"}`,padding:"8px 12px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:14}}>{p.icon}</span>
                  <div>
                    <div style={{fontSize:10,color:"#94a3b8"}}>{p.phase}</div>
                    <div style={{fontSize:12,color:activePhase===idx?p.color:"#e2e8ef"}}>{p.title}</div>
                  </div>
                </button>
                {activePhase===idx && p.lessons.map(l=>(
                  <button key={l.id} onClick={()=>{setActiveLesson(l);loadLessonCode(l);}}
                    style={{width:"100%",background:activeLesson?.id===l.id?"#333350":"transparent",border:"none",padding:"5px 12px 5px 30px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:10}}>{completed[l.id]?"✅":"⬜"}</span>
                    <span style={{fontSize:11,color:activeLesson?.id===l.id?"#e2e8ef":"#cbd5e1"}}>{l.title}</span>
                  </button>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* Main */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* Phase overview */}
          {view==="curriculum" && !activeLesson && (
            <div style={{padding:20,overflowY:"auto",flex:1}}>
              <div style={{fontSize:17,fontWeight:"bold",color:phase.color,marginBottom:4}}>{phase.icon} {phase.phase}: {phase.title}</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:16}}>Select a lesson to begin →</div>
              <div style={{display:"grid",gap:12}}>
                {phase.lessons.map(l=>(
                  <div key={l.id} onClick={()=>{setActiveLesson(l);loadLessonCode(l);}}
                    style={{background:"#2a2a3e",border:`1px solid ${completed[l.id]?phase.color:"#333350"}`,borderRadius:8,padding:16,cursor:"pointer"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=phase.color}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=completed[l.id]?phase.color:"#333350"}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:"bold",color:"#e2e8ef",marginBottom:2}}>{l.title}</div>
                        <div style={{fontSize:11,color:phase.color}}>{l.project}</div>
                      </div>
                      <span style={{fontSize:10,color:"#64748b",background:"#333350",padding:"2px 7px",borderRadius:8,height:"fit-content"}}>⏱ {l.duration}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {l.concepts.map(c=><span key={c} style={{background:"#1e1e2e",border:`1px solid ${phase.color}33`,color:phase.color,padding:"1px 6px",borderRadius:3,fontSize:9}}>{c}</span>)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Lesson + Editor */}
          {view==="curriculum" && activeLesson && (
            <div style={{display:"flex",flex:1,overflow:"hidden"}}>
              {/* Left: explanations */}
              <div style={{flex:1,overflowY:"auto",borderRight:"1px solid #333350"}}>
                <div style={{padding:"10px 14px",borderBottom:"1px solid #333350",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#13131f"}}>
                  <div>
                    <button onClick={()=>setActiveLesson(null)} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:10,padding:0,marginBottom:3}}>← Back</button>
                    <div style={{fontSize:13,fontWeight:"bold",color:"#e2e8ef"}}>{activeLesson.title}</div>
                    <div style={{fontSize:11,color:phase.color}}>{activeLesson.project}</div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>setShowExp(!showExp)}
                      style={{background:showExp?phase.color:"#333350",color:showExp?"#000":"#94a3b8",border:"none",borderRadius:5,padding:"3px 7px",fontSize:9,cursor:"pointer"}}>
                      {showExp?"💡 ON":"💡 OFF"}
                    </button>
                    <button onClick={()=>setCompleted(p=>({...p,[activeLesson.id]:true}))}
                      style={{background:completed[activeLesson.id]?"#333350":phase.color,color:completed[activeLesson.id]?"#64748b":"#000",border:"none",borderRadius:5,padding:"3px 7px",fontSize:9,cursor:"pointer"}}>
                      {completed[activeLesson.id]?"✅ Done":"Mark Done"}
                    </button>
                  </div>
                </div>
                <div style={{margin:"8px 12px",background:"#2d2a1e",border:"1px solid #F59E0B44",borderRadius:6,padding:"7px 10px"}}>
                  <div style={{color:"#F59E0B",fontSize:10,lineHeight:1.6}}>{activeLesson.memTrick}</div>
                </div>
                <div style={{margin:"0 12px 12px"}}>
                  {activeLesson.lines.map((line,i)=>{
                    if(!line.code && line.exp===null) return <div key={i} style={{height:6}}/>;
                    const icon=line.exp?line.exp[0]:null;
                    const iconColor=ICON_COLORS[icon]||"#8b949e";
                    return (
                      <div key={i} style={{background:"#252538",marginBottom:1,borderRadius:3,overflow:"hidden"}}>
                        <div style={{display:"flex"}}>
                          <div style={{width:26,flexShrink:0,padding:"7px 0",textAlign:"center",fontSize:9,color:"#4a5568",borderRight:"1px solid #1e1e2e"}}>{i+1}</div>
                          <div style={{flex:1,padding:"7px 9px"}}>
                            <pre style={{margin:0,fontSize:11,color:"#e2e8ef",whiteSpace:"pre-wrap",lineHeight:1.5}}>{line.code||" "}</pre>
                            {showExp && line.exp && (
                              <div style={{marginTop:3,padding:"4px 7px",background:"#1e1e2e",borderRadius:3,borderLeft:`2px solid ${iconColor}`,display:"flex",gap:5}}>
                                <span style={{fontSize:11,flexShrink:0}}>{icon}</span>
                                <span style={{fontSize:10,color:"#94a3b8",lineHeight:1.6}}>{line.exp.slice(2)}</span>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Right: Editor */}
              <div style={{width:400,display:"flex",flexDirection:"column",background:"#1e1e2e",flexShrink:0}}>
                <div style={{padding:"7px 10px",borderBottom:"1px solid #333350",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#13131f"}}>
                  <div style={{fontSize:10,color:"#94a3b8"}}>📝 Editor</div>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>loadLessonCode(activeLesson)} style={{background:"#333350",color:"#94a3b8",border:"none",borderRadius:4,padding:"2px 7px",fontSize:9,cursor:"pointer"}}>↺ Reset</button>
                    <button onClick={()=>copyCode(code,"editor")} style={{background:copied==="editor"?"#00D084":"#333350",color:copied==="editor"?"#000":"#94a3b8",border:"none",borderRadius:4,padding:"2px 7px",fontSize:9,cursor:"pointer"}}>{copied==="editor"?"✅":"📋"}</button>
                    <button onClick={runCode} disabled={running||!pyReady}
                      style={{background:running?"#333350":"#00D084",color:running?"#94a3b8":"#000",border:"none",borderRadius:4,padding:"2px 10px",fontSize:10,cursor:running||!pyReady?"not-allowed":"pointer",fontWeight:"bold"}}>
                      {running?"⏳":"▶ Run"}
                    </button>
                  </div>
                </div>
                <textarea ref={textareaRef} value={code} onChange={e=>setCode(e.target.value)} onKeyDown={handleTabKey} spellCheck={false}
                  style={{flex:1,background:"#1a1a2e",color:"#e2e8ef",border:"none",padding:"10px",fontSize:11,fontFamily:"inherit",lineHeight:1.7,minHeight:0}}
                  placeholder="# Your Python code here...&#10;# Click ▶ Run to execute!"/>
                <div style={{borderTop:"1px solid #333350",background:"#13131f"}}>
                  <div style={{padding:"5px 10px",borderBottom:"1px solid #333350",display:"flex",justifyContent:"space-between"}}>
                    <div style={{fontSize:10,color:"#94a3b8"}}>⚡ Output</div>
                    <button onClick={()=>setOutput("")} style={{background:"none",border:"none",color:"#4a5568",cursor:"pointer",fontSize:9}}>Clear</button>
                  </div>
                  <div style={{height:150,overflowY:"auto",padding:"8px 10px"}}>
                    {output?<pre style={{margin:0,fontSize:11,color:output.includes("❌")?"#fc8181":"#68d391",whiteSpace:"pre-wrap",lineHeight:1.6}}>{output}</pre>
                    :<div style={{color:"#4a5568",fontSize:10,fontStyle:"italic"}}>Click ▶ Run to see output...</div>}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Cheat Sheet */}
          {view==="cheatsheet" && (
            <div style={{padding:20,overflowY:"auto",flex:1}}>
              <div style={{fontSize:17,fontWeight:"bold",color:"#e2e8ef",marginBottom:16}}>📋 Syntax Cheat Sheet — click any line to copy</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:10}}>
                {[
                  {cat:"Variables",items:['name = "Alice"',"age = 25","is_active = True","pi = 3.14"]},
                  {cat:"Print & f-strings",items:['print("text")','print(f"Hi {name}")', 'print("=" * 40)','print(x, y)']},
                  {cat:"Lists",items:["lst = [1,2,3]","lst.append(4)","lst[0]","len(lst)","lst[-1]"]},
                  {cat:"Dictionaries",items:['d = {"k":"v"}','d["key"]','d.get("k",default)',"d.keys()","d.items()"]},
                  {cat:"Conditions",items:["if x > 0:","elif x == 0:","else:","if a and b:","if a or b:"]},
                  {cat:"Loops",items:["for item in list:","for i in range(5):","for k,v in d.items():","while condition:"]},
                  {cat:"Functions",items:["def func(x, y=0):","    return x + y","result = func(5,3)","*args for many args"]},
                  {cat:"Classes",items:["class Dog:","    def __init__(self,n):","        self.name = n","d = Dog('Rex')"]},
                  {cat:"List Comprehension",items:["[x for x in lst]","[x for x in lst if x>0]","[x*2 for x in range(5)]"]},
                  {cat:"Error Handling",items:["try:","    risky_code()","except ValueError as e:","    print(e)","finally:"]},
                  {cat:"Imports",items:["import requests","from fastapi import FastAPI","import json","from datetime import datetime"]},
                  {cat:"String Methods",items:["s.lower()","s.upper()","s.strip()",'s.split(",")','f"Hi {name}"']},
                ].map(sec=>(
                  <div key={sec.cat} style={{background:"#2a2a3e",border:"1px solid #333350",borderRadius:8,overflow:"hidden"}}>
                    <div style={{background:"#13131f",padding:"5px 10px",fontSize:10,fontWeight:"bold",color:"#00D084"}}>{sec.cat}</div>
                    <div style={{padding:8}}>
                      {sec.items.map((item,i)=>(
                        <div key={i} onClick={()=>copyCode(item,`cs-${sec.cat}-${i}`)}
                          style={{background:copied===`cs-${sec.cat}-${i}`?"#00D08422":"#1e1e2e",borderRadius:3,padding:"3px 7px",marginBottom:3,cursor:"pointer",display:"flex",justifyContent:"space-between"}}>
                          <code style={{fontSize:10,color:"#e2e8ef"}}>{item}</code>
                          <span style={{fontSize:9,color:"#4a5568"}}>{copied===`cs-${sec.cat}-${i}`?"✅":"copy"}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Quiz */}
          {view==="quiz" && (
            <div style={{padding:20,overflowY:"auto",flex:1}}>
              <div style={{maxWidth:500,margin:"0 auto"}}>
                <div style={{fontSize:17,fontWeight:"bold",color:"#e2e8ef",marginBottom:4}}>🧠 Syntax Quiz</div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:20}}>No peeking! Builds muscle memory. Do this every morning.</div>
                {!quiz.active && quiz.q===0 && (
                  <div style={{textAlign:"center",padding:40}}>
                    <div style={{fontSize:48,marginBottom:12}}>🧠</div>
                    <div style={{fontSize:14,color:"#e2e8ef",marginBottom:20}}>{QUIZ.length} questions • Answer from memory</div>
                    <button onClick={()=>setQuiz({active:true,q:0,score:0,answered:null})}
                      style={{background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"10px 24px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>
                      Start Quiz →
                    </button>
                  </div>
                )}
                {quiz.active && quiz.q<QUIZ.length && (
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,fontSize:10,color:"#64748b"}}>
                      <span>Q {quiz.q+1} of {QUIZ.length}</span><span>Score: {quiz.score}/{quiz.q} ✅</span>
                    </div>
                    <div style={{background:"#2a2a3e",border:"1px solid #333350",borderRadius:8,padding:16,marginBottom:12}}>
                      <div style={{fontSize:14,color:"#e2e8ef",fontWeight:"bold"}}>{QUIZ[quiz.q].q}</div>
                    </div>
                    <div style={{display:"grid",gap:7}}>
                      {QUIZ[quiz.q].opts.map((opt,i)=>{
                        const correct=opt===QUIZ[quiz.q].a;
                        const answered=quiz.answered!==null;
                        const selected=quiz.answered===opt;
                        let bg="#2a2a3e",border="#333350",color="#e2e8ef";
                        if(answered){if(correct){bg="#1a2e1a";border="#00D084";color="#00D084";}else if(selected){bg="#2e1a1a";border="#fc8181";color="#fc8181";}}
                        return (
                          <button key={i} disabled={answered}
                            onClick={()=>setQuiz(p=>({...p,answered:opt,score:opt===QUIZ[p.q].a?p.score+1:p.score}))}
                            style={{background:bg,border:`1px solid ${border}`,color,borderRadius:6,padding:"9px 12px",fontSize:11,cursor:answered?"default":"pointer",textAlign:"left"}}>
                            <code>{opt}</code>{answered&&correct&&" ✅"}{answered&&selected&&!correct&&" ❌"}
                          </button>
                        );
                      })}
                    </div>
                    {quiz.answered && (
                      <button onClick={()=>setQuiz(p=>({...p,q:p.q+1,answered:null}))}
                        style={{marginTop:10,background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"7px 16px",fontSize:11,fontWeight:"bold",cursor:"pointer"}}>
                        {quiz.q+1<QUIZ.length?"Next →":"See Score →"}
                      </button>
                    )}
                  </div>
                )}
                {quiz.active && quiz.q>=QUIZ.length && (
                  <div style={{textAlign:"center",padding:40}}>
                    <div style={{fontSize:48,marginBottom:12}}>{quiz.score>=6?"🏆":quiz.score>=4?"💪":"📚"}</div>
                    <div style={{fontSize:22,color:"#00D084",fontWeight:"bold",marginBottom:6}}>{quiz.score}/{QUIZ.length}</div>
                    <div style={{fontSize:13,color:"#e2e8ef",marginBottom:20}}>{quiz.score>=6?"Syntax locked in! 🔥":quiz.score>=4?"Getting there — retry!":"Keep at it — repetition = memory."}</div>
                    <button onClick={()=>setQuiz({active:true,q:0,score:0,answered:null})}
                      style={{background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"10px 24px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>
                      Try Again →
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Settings Modal */}
      {showSettings && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:"#1e1e2e",border:"1px solid #333350",borderRadius:14,padding:24,width:420,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontSize:16,fontWeight:"bold",color:"#e2e8ef",marginBottom:4}}>⚙️ AI Tutor Setup</div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:20}}>Enter one API key to power the chat tutor. Keys are saved locally in your browser — never sent anywhere else.</div>

            {/* Gemini */}
            <div style={{marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <div style={{fontSize:11,fontWeight:"bold",color:"#00D084"}}>🟢 Google Gemini</div>
                <span style={{fontSize:9,background:"#00D08422",color:"#00D084",padding:"2px 7px",borderRadius:8,border:"1px solid #00D08444"}}>⭐ Recommended — FREE</span>
              </div>
              <input value={keyInput.gemini} onChange={e=>setKeyInput(p=>({...p,gemini:e.target.value}))}
                placeholder={geminiKey?"✅ Key saved — paste new to update":"Paste your Gemini API key here"}
                style={{width:"100%",background:"#13131f",border:`1px solid ${geminiKey?"#00D08466":"#333350"}`,borderRadius:6,padding:"8px 10px",fontSize:11,color:"#e2e8ef",fontFamily:"inherit",marginBottom:6}}/>
              <div style={{fontSize:10,color:"#64748b",background:"#13131f",borderRadius:5,padding:"7px 10px",borderLeft:"2px solid #00D084",marginBottom:16}}>
                💡 <strong style={{color:"#94a3b8"}}>How to get it free:</strong> Go to <span style={{color:"#00D084"}}>aistudio.google.com</span> → Sign in with Google → Click "Get API Key" → Create new key. Takes 30 seconds, no credit card needed.
              </div>
            </div>

            {/* OpenAI */}
            <div style={{marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <div style={{fontSize:11,fontWeight:"bold",color:"#74aa9c"}}>🟦 OpenAI (ChatGPT)</div>
                <span style={{fontSize:9,background:"#74aa9c22",color:"#74aa9c",padding:"2px 7px",borderRadius:8,border:"1px solid #74aa9c44"}}>Paid — ~$0.60/1M tokens</span>
              </div>
              <input value={keyInput.openai} onChange={e=>setKeyInput(p=>({...p,openai:e.target.value}))}
                placeholder={openaiKey?"✅ Key saved — paste new to update":"Paste your OpenAI API key (sk-...)"}
                style={{width:"100%",background:"#13131f",border:`1px solid ${openaiKey?"#74aa9c66":"#333350"}`,borderRadius:6,padding:"8px 10px",fontSize:11,color:"#e2e8ef",fontFamily:"inherit",marginBottom:6}}/>
              <div style={{fontSize:10,color:"#64748b",background:"#13131f",borderRadius:5,padding:"7px 10px",borderLeft:"2px solid #74aa9c",marginBottom:16}}>
                💡 <strong style={{color:"#94a3b8"}}>How to get it:</strong> Go to <span style={{color:"#74aa9c"}}>platform.openai.com</span> → Sign in → API Keys → Create new key. Requires adding a small credit (~$5). Uses <strong style={{color:"#94a3b8"}}>gpt-4o-mini</strong> — fast and affordable.
              </div>
            </div>

            {/* Anthropic */}
            <div style={{marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <div style={{fontSize:11,fontWeight:"bold",color:"#f472b6"}}>🟠 Anthropic (Claude)</div>
                <span style={{fontSize:9,background:"#f472b622",color:"#f472b6",padding:"2px 7px",borderRadius:8,border:"1px solid #f472b644"}}>Paid — ~$0.80/1M tokens</span>
              </div>
              <input value={keyInput.anthropic} onChange={e=>setKeyInput(p=>({...p,anthropic:e.target.value}))}
                placeholder={anthropicKey?"✅ Key saved — paste new to update":"Paste your Anthropic API key (sk-ant-...)"}
                style={{width:"100%",background:"#13131f",border:`1px solid ${anthropicKey?"#f472b666":"#333350"}`,borderRadius:6,padding:"8px 10px",fontSize:11,color:"#e2e8ef",fontFamily:"inherit",marginBottom:6}}/>
              <div style={{fontSize:10,color:"#64748b",background:"#13131f",borderRadius:5,padding:"7px 10px",borderLeft:"2px solid #f472b6",marginBottom:16}}>
                💡 <strong style={{color:"#94a3b8"}}>How to get it:</strong> Go to <span style={{color:"#f472b6"}}>console.anthropic.com</span> → Sign in → API Keys → Create key. Add $5 credit to start. Uses <strong style={{color:"#94a3b8"}}>Claude Haiku</strong> — very fast and capable.
              </div>
            </div>

            {/* Priority note */}
            {(geminiKey||openaiKey||anthropicKey) && (
              <div style={{fontSize:10,color:"#64748b",background:"#252538",borderRadius:6,padding:"8px 10px",marginBottom:16,border:"1px solid #333350"}}>
                🔄 <strong style={{color:"#94a3b8"}}>Active provider:</strong> <span style={{color:"#00D084"}}>{activeProvider}</span> — if multiple keys are saved, priority is Gemini → OpenAI → Anthropic.
                {" "}<button onClick={()=>{
                  if(window.confirm("Clear all saved API keys?")) {
                    localStorage.removeItem("gemini_key"); localStorage.removeItem("openai_key"); localStorage.removeItem("anthropic_key");
                    setGeminiKey(""); setOpenaiKey(""); setAnthropicKey("");
                  }
                }} style={{background:"none",border:"none",color:"#fc8181",cursor:"pointer",fontSize:10,textDecoration:"underline",padding:0}}>Clear all keys</button>
              </div>
            )}

            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowSettings(false)} style={{background:"#333350",color:"#94a3b8",border:"none",borderRadius:6,padding:"7px 14px",fontSize:11,cursor:"pointer"}}>Cancel</button>
              <button onClick={saveKeys} style={{background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"7px 14px",fontSize:11,fontWeight:"bold",cursor:"pointer"}}>Save Keys →</button>
            </div>
          </div>
        </div>
      )}

      {/* Floating Chat Button */}
      <button onClick={()=>{ if(!hasKey){setShowSettings(true);}else{setChatOpen(o=>!o);} }}
        style={{position:"fixed",bottom:24,right:24,width:50,height:50,borderRadius:"50%",background:chatOpen?"#333350":"#00D084",color:chatOpen?"#e2e8ef":"#000",border:"none",fontSize:20,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,208,132,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {chatOpen?"✕":"💬"}
      </button>

      {/* Chat Panel */}
      {chatOpen && (
        <div style={{position:"fixed",bottom:86,right:24,width:330,height:440,background:"#1e1e2e",border:"1px solid #333350",borderRadius:14,display:"flex",flexDirection:"column",zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",overflow:"hidden"}}>
          <div style={{padding:"10px 14px",background:"#13131f",borderBottom:"1px solid #333350",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>🤖</span>
              <div>
                <div style={{fontSize:13,fontWeight:"bold",color:"#e2e8ef"}}>Python Tutor</div>
                <div style={{fontSize:10,color:"#64748b"}}>{activeLesson?`On: ${activeLesson.title}`:"Ask me anything about Python"}</div>
              </div>
            </div>
            <div style={{fontSize:9,color:"#64748b",background:"#252538",padding:"2px 6px",borderRadius:5,cursor:"pointer"}} onClick={()=>setChatOpen(false)&&setShowSettings(true)}>
              via {activeProvider}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"10px",display:"flex",flexDirection:"column",gap:8}}>
            {chatMessages.map((msg,i)=>(
              <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",background:msg.role==="user"?"#00D084":"#2a2a3e",color:msg.role==="user"?"#000":"#e2e8ef",borderRadius:msg.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"7px 11px",fontSize:12,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                  {msg.text}
                </div>
              </div>
            ))}
            {chatLoading && <div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:"#2a2a3e",borderRadius:"12px 12px 12px 2px",padding:"7px 12px",fontSize:16}}>⏳</div></div>}
            <div ref={chatEndRef}/>
          </div>
          <div style={{padding:"8px 10px",borderTop:"1px solid #333350",display:"flex",gap:7}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()}
              placeholder="Ask a Python question..."
              style={{flex:1,background:"#13131f",border:"1px solid #333350",borderRadius:7,padding:"7px 10px",fontSize:12,color:"#e2e8ef",fontFamily:"inherit"}}/>
            <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()}
              style={{background:chatLoading||!chatInput.trim()?"#333350":"#00D084",color:chatLoading||!chatInput.trim()?"#718096":"#000",border:"none",borderRadius:7,padding:"7px 12px",fontSize:13,fontWeight:"bold",cursor:chatLoading||!chatInput.trim()?"not-allowed":"pointer"}}>
              →
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
