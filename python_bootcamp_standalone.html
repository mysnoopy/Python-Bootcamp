<script>
window.onerror = function(msg, src, line, col, err) {
  if (err) console.error('Full error:', err);
  console.error('Script error details:', msg, 'src:', src, 'line:', line, 'col:', col);
  var d = document.getElementById('loading-screen');
  if (!d) return;
  // If cross-origin "Script error.", try Babel diagnostic
  if (msg === 'Script error.' && typeof Babel !== 'undefined') {
    var babelSrc = document.querySelector('script[type="text/babel"]');
    if (babelSrc) {
      try {
        Babel.transform(babelSrc.textContent, {presets:['react']});
        // No Babel error — show generic message
        d.innerHTML = '<div style="color:#e06c75;font-family:monospace;padding:30px">❌ Runtime Error (Script error. — unknown cross-origin error)</div>';
      } catch(bErr) {
        d.innerHTML = '<div style="color:#e06c75;font-family:monospace;padding:30px;white-space:pre-wrap">'
          + '<div style="font-size:18px;margin-bottom:12px">❌ Babel Parse Error</div>'
          + '<div style="font-size:13px;background:#1e1e2e;padding:12px;border-radius:4px;margin-bottom:8px">' + bErr.message + '</div>'
          + '<div style="font-size:12px;color:#94a3b8">Fix the syntax error above, then reload.</div>'
          + '</div>';
        return;
      }
    }
  }
  d.innerHTML = '<div style="color:#e06c75;font-family:monospace;padding:30px;max-width:700px;white-space:pre-wrap">'
    + '<div style="font-size:20px;margin-bottom:12px">❌ JavaScript Error</div>'
    + '<div style="font-size:13px;margin-bottom:8px"><b>Message:</b> ' + msg + '</div>'
    + '<div style="font-size:13px;margin-bottom:8px"><b>Line:</b> ' + line + ' Col: ' + col + '</div>'
    + '<div style="font-size:12px;color:#94a3b8">' + (src||'') + '</div>'
    + '</div>';
};
window.addEventListener('unhandledrejection', function(e) {
  var d = document.getElementById('loading-screen');
  if (d) {
    d.innerHTML = '<div style="color:#e06c75;font-family:monospace;padding:30px;max-width:700px;white-space:pre-wrap">'
      + '<div style="font-size:20px;margin-bottom:12px">❌ Unhandled Promise Rejection</div>'
      + '<div style="font-size:13px">' + (e.reason?.message || String(e.reason)) + '</div>'
      + '</div>';
  }
});
</script>

    { id:"7b", title:"RAG — Retrieval Augmented Generation", duration:"60 min", project:"🎯 Knowledge Base Q&A",
      memTrick:"💡 RAG = Give AI a reference book before asking. Without RAG, AI only knows training data. With RAG, it answers from YOUR documents.",
      concepts:["retrieval","context injection","chunking","keyword search","grounding"],
                  lines:[
        {code:"# ✅ Your API key is injected automatically from AI Tutor settings", exp:"💬 SETUP — key injected from settings."},
        {code:"import json", exp:"📦 json needed by call_ai."},
        {code:"def call_ai(prompt):", exp:"🛠️ AI function — auto-filled by bootcamp."},
        {code:"    pass  # auto-filled by bootcamp", exp:"▶️ Replaced with real API call."},
        {code:"", exp:null},
        {code:"knowledge_base = [", exp:"📦 STORE — our mini database of Python facts."},
        {code:"    {'topic': 'Python Lists', 'content': 'Use append() to add, pop() to remove, len() to count.'},", exp:"📦 Doc 1."},
        {code:"    {'topic': 'Python Dicts', 'content': 'Use dict[key] to access, .get() for safe access.'},", exp:"📦 Doc 2."},
        {code:"    {'topic': 'Python Functions', 'content': 'Define with def. Use return for outputs.'},", exp:"📦 Doc 3."},
        {code:"    {'topic': 'Python Classes', 'content': 'self refers to the instance. __init__ is the constructor.'},", exp:"📦 Doc 4."},
        {code:"]", exp:"📦 Closes knowledge_base list."},
        {code:"", exp:null},
        {code:"def retrieve(query, kb, top_k=2):", exp:"🛠️ RETRIEVE — find most relevant docs by keyword match."},
        {code:"    words = query.lower().split()", exp:"📦 Split query into words."},
        {code:"    scores = []", exp:"📦 Will hold (score, doc) pairs."},
        {code:"    for doc in kb:", exp:"🔁 Check every document."},
        {code:"        text = (doc['topic'] + ' ' + doc['content']).lower()", exp:"📦 Combine topic + content for matching."},
        {code:"        score = sum(1 for w in words if w in text)", exp:"📦 Count matching words — simple relevance score."},
        {code:"        scores.append((score, doc))", exp:"📦 Save score paired with doc."},
        {code:"    scores.sort(key=lambda x: x[0], reverse=True)", exp:"📦 Sort: highest score first."},
        {code:"    return [doc for _, doc in scores[:top_k]]", exp:"↩️ Return top_k most relevant docs."},
        {code:"", exp:null},
        {code:"def rag_answer(question):", exp:"🛠️ FULL RAG PIPELINE — retrieve then generate."},
        {code:"    docs = retrieve(question, knowledge_base)", exp:"🔍 Step 1: RETRIEVE relevant docs."},
        {code:"    context = '\\n'.join([d['topic'] + ': ' + d['content'] for d in docs])", exp:"📦 Step 2: AUGMENT — format docs as context."},
        {code:"    prompt = 'Context:\\n' + context + '\\n\\nQuestion: ' + question + '\\nAnswer concisely.'", exp:"📦 Step 3: Build grounded prompt."},
        {code:"    answer = call_ai(prompt)", exp:"🌐 Step 4: GENERATE answer from context."},
        {code:"    print('Q: ' + question)", exp:"🖨️ Print question."},
        {code:"    print('Retrieved:', [d['topic'] for d in docs])", exp:"🖨️ Show which docs were used."},
        {code:"    print('A: ' + str(answer))", exp:"🖨️ Print grounded answer."},
        {code:"    print()", exp:"🖨️ Blank line."},
        {code:"", exp:null},
        {code:"rag_answer('How do I add items to a list?')", exp:"▶️ Should retrieve Python Lists doc."},
        {code:"rag_answer('What is self in a class?')", exp:"▶️ Should retrieve Python Classes doc."}
      ]},

    { id:"9b", title:"Writing Tests", duration:"40 min", project:"🎯 Test Your Own Functions",
      memTrick:"💡 A test = call your function + check the result. assert means 'I promise this is true — crash if it isn't'. Tests = your safety net.",
      concepts:["assert","unittest","test functions","assertEqual","setUp","edge cases"],
      lines:[
        {code:"# 🎯 PROJECT: Write tests for a simple calculator", exp:"💬 Tests check that your code does what you expect. Write them BEFORE you think your code is done."},
        {code:"import unittest", exp:"📦 unittest — built into Python. No pip needed. The standard testing framework."},
        {code:"", exp:null},
        {code:"# ── The code we want to test ──", exp:"💬 First, let's write a simple calculator with a bug we'll catch with tests."},
        {code:"def add(a, b): return a + b", exp:"➕ Simple add function."},
        {code:"def subtract(a, b): return a - b", exp:"➖ Simple subtract."},
        {code:"def multiply(a, b): return a * b", exp:"✖️ Simple multiply."},
        {code:"def divide(a, b):", exp:"➗ Divide — needs error handling."},
        {code:"    if b == 0: raise ValueError('Cannot divide by zero')", exp:"🛡️ raise creates an error on purpose. ValueError = the value is wrong/invalid."},
        {code:"    return a / b", exp:"➗ Normal division if b is not zero."},
        {code:"", exp:null},
        {code:"# ── Quick assertions (simplest tests) ──", exp:"💬 assert = 'I promise this is True'. If it's False, Python crashes with AssertionError."},
        {code:"assert add(2, 3) == 5,       'add failed'", exp:"✅ 2+3=5. If this ever returns something else, we'll know immediately."},
        {code:"assert subtract(10, 4) == 6, 'subtract failed'", exp:"✅ 10-4=6."},
        {code:"assert multiply(3, 4) == 12, 'multiply failed'", exp:"✅ 3×4=12."},
        {code:"assert add(0, 0) == 0,       'zero case failed'", exp:"✅ Edge case — zero inputs. Always test edge cases!"},
        {code:"assert add(-1, 1) == 0,      'negative case failed'", exp:"✅ Edge case — negative numbers."},
        {code:"print('All basic assertions passed!')", exp:"🎉 Only prints if ALL assertions above passed. One failure = crash before this line."},
        {code:"", exp:null},
        {code:"# ── Proper unittest class ──", exp:"💬 unittest.TestCase gives you better error messages and lets you run many tests at once."},
        {code:"class TestCalculator(unittest.TestCase):", exp:"🏗️ Class inheriting from TestCase. All test methods inside will be auto-discovered."},
        {code:"    def test_add_positive(self):", exp:"🧪 Method starting with 'test_' is auto-run. Tests positive numbers."},
        {code:"        self.assertEqual(add(2, 3), 5)", exp:"✅ assertEqual = assert a == b, but with a better error message if it fails."},
        {code:"    def test_add_negative(self):", exp:"🧪 Test negative numbers."},
        {code:"        self.assertEqual(add(-1, -1), -2)", exp:"✅ -1 + -1 = -2."},
        {code:"    def test_divide_by_zero(self):", exp:"🧪 Test that divide raises an error when b=0."},
        {code:"        with self.assertRaises(ValueError):", exp:"✅ assertRaises = 'I expect this to raise ValueError'. Test PASSES if the error IS raised."},
        {code:"            divide(10, 0)", exp:"💥 This should raise ValueError — and our test expects that, so it passes."},
        {code:"", exp:null},
        {code:"suite = unittest.TestLoader().loadTestsFromTestCase(TestCalculator)", exp:"🔍 Collect all test_ methods from our class."},
        {code:"runner = unittest.TextTestRunner(verbosity=2)", exp:"🏃 verbosity=2 prints each test name and result."},
        {code:"runner.run(suite)", exp:"▶️ Run all tests and print results."}
      ]},

        {code:"# ── Bug 1: Wrong type ──", exp:"💬 Most beginner bugs are type errors — mixing strings and numbers."},
        {code:"def calculate_discount(price, discount_pct):", exp:"🔧 FUNCTION — should return price after discount."},
        {code:"    # BUG: discount_pct might come in as a string '20'", exp:"💬 COMMENT — hints about the bug. In real code, inputs from users are ALWAYS strings."},

        {code:"", exp:null},

        {code:"print(calculate_discount(49.99, 15))", exp:"✅ Returns 42.49. Works with both string and number input now."},
        {code:"", exp:null},
        {code:"# ── Bug 2: Off-by-one error ──", exp:"💬 Off-by-one = loop runs one too many or too few times. Very common in list operations."},
        {code:"def get_last_three(items):", exp:"🔧 FUNCTION — should return the last 3 items from a list."},
        {code:"    # BUG: items[-4:-1] misses the last item!", exp:"💬 Common mistake: -1 stops BEFORE the last element."},

        {code:"def remove_negatives(numbers):", exp:"🔧 FUNCTION — should remove all negative numbers."},

        {code:"    return [n for n in numbers if n >= 0]  # FIX: list comprehension", exp:"🔧 FIX — build a NEW list with only non-negatives. Don't modify the original while looping."},

        {code:"", exp:null},

      action:{method:"GET", url:"/", label:"GET /"},

      run:(db,_i) => ({status:200, resp:db}) },
    { title:"3. Query Parameters",
      concept:"Add a typed parameter to the function — FastAPI reads it from ?category=tech in the URL automatically. Optional[str] = None means it defaults to None if not provided.",
      code:"from fastapi import FastAPI\nfrom typing import Optional\n\napp = FastAPI()\nbooks_db = [\n    {'id':1,'title':'Clean Code','price':29.99,'category':'tech'},\n    {'id':2,'title':'Dune','price':14.99,'category':'sci-fi'},\n]\n\n@app.get('/books')\ndef get_books(category: Optional[str] = None):\n    if category:\n        return [b for b in books_db if b['category']==category]\n    return books_db",

    { title:"4. Pydantic Validation",
      concept:"BaseModel defines the shape of POST body JSON. FastAPI validates it automatically — wrong type = 422 error. **book.dict() unpacks the model into a regular dict.",
      code:"from fastapi import FastAPI\nfrom pydantic import BaseModel\n\napp = FastAPI()\nbooks_db = []\n\nclass Book(BaseModel):\n    title: str\n    price: float\n    category: str\n\n@app.post('/books', status_code=201)\ndef create_book(book: Book):\n    new = {'id': len(books_db)+1, **book.dict()}\n    books_db.append(new)\n    return new",

        return {status:201, resp:book, newBook:book};

      body:"Inside the cloned folder, run:",
      cmd:"uvicorn main:app --reload",links:[],
      note:"main.py already includes CORS middleware so the Live simulator can connect from your browser."},
    {key:"open",num:5,title:"Open interactive docs",
      body:"FastAPI auto-generates a live playground at /docs — try all endpoints here:",
      cmd:null,links:[
        {label:"localhost:8000/docs →",href:"http://localhost:8000/docs"},
        {label:"localhost:8000/books →",href:"http://localhost:8000/books"},
      ]},
  ];
  const doneCount=steps.filter(s=>checks[s.key]).length;

  /* ── NavBtn ── */
  const NavBtn=({v,label})=>(
    <button onClick={()=>setMainView(v)}
      style={{background:mainView===v?"#fb923c":T.bgRaised,color:mainView===v?"#000":T.textDim,
        border:"none",borderRadius:5,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:mainView===v?"bold":"normal"}}>
      {label}
    </button>
  );

  /* ── Response log card ── */
  const LogCard=({entry})=>(
    <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:6,marginBottom:8,overflow:"hidden"}}>
      <div style={{padding:"6px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:methodColor(entry.method),fontWeight:"bold",fontSize:12}}>{entry.method}</span>
        <span style={{color:T.text,fontSize:12,fontFamily:"monospace",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.url}</span>
        <span style={{color:statusColor(entry.status),fontWeight:"bold",fontSize:12,flexShrink:0}}>{entry.status||"ERR"}</span>
        <span style={{color:T.textFnt,fontSize:11,flexShrink:0}}>{entry.time}</span>
      </div>
      {entry.body&&(
        <div style={{padding:"6px 10px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{fontSize:10,color:T.textDim,marginBottom:2}}>REQUEST BODY</div>
          <pre style={{margin:0,fontSize:11,color:"#e5c07b",whiteSpace:"pre-wrap"}}>{entry.body}</pre>
        </div>
      )}
      <div style={{padding:"6px 10px"}}>
        <div style={{fontSize:10,color:T.textDim,marginBottom:2}}>RESPONSE</div>
        <pre style={{margin:0,fontSize:11,color:entry.status>=400||entry.status===0?"#e06c75":"#98c379",whiteSpace:"pre-wrap"}}>{entry.resp}</pre>
      </div>
    </div>
  );

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",background:T.bgDeep,overflow:"hidden",minWidth:220}}>

      {/* ── top nav ── */}
      <div style={{padding:"5px 10px",borderBottom:`1px solid ${T.border}`,background:T.bgDeep,flexShrink:0,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"#fb923c",fontWeight:"bold",marginRight:4}}>⚡ FastAPI</span>
        <NavBtn v="simulator" label="🖥 Simulator"/>
        <NavBtn v="tutorial"  label="📖 Tutorial"/>
        <NavBtn v="local"     label="🏠 Run Locally"/>
        {/* Live server toggle — only in simulator */}
        {mainView==="simulator"&&(
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
            <button onClick={()=>setLiveMode(m=>!m)}
              style={{background:liveMode?"#98c379":T.bgRaised,color:liveMode?"#000":T.textDim,
                border:`1px solid ${liveMode?"#98c379":T.border}`,borderRadius:5,padding:"2px 8px",fontSize:11,cursor:"pointer"}}>
              {liveMode?"🟢 Live":"⚫ Mock"}
            </button>
            {liveMode&&(
              <>
                <input value={liveUrl} onChange={e=>setLiveUrl(e.target.value)}
                  style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"2px 6px",fontSize:11,color:T.text,width:160}}/>
                <button onClick={pingServer}
                  style={{background:liveStatus==="ok"?"#98c379":liveStatus==="cors"?"#e5c07b":liveStatus==="err"?"#e06c75":T.bgRaised,
                    color:liveStatus?"#000":T.textDim,border:"none",borderRadius:4,padding:"2px 7px",fontSize:11,cursor:"pointer"}}>
                  {liveStatus==="ok"?"✅ Connected":liveStatus==="cors"?"⚠️ CORS":liveStatus==="err"?"❌ No server":"Ping"}
                </button>
              </>
            )}
          </div>
        )}
        {mainView==="tutorial"&&<span style={{marginLeft:"auto",fontSize:11,color:T.textDim}}>Step {tutStep+1}/{TUT_STEPS.length}</span>}
        {mainView==="local"&&doneCount>0&&<span style={{marginLeft:"auto",fontSize:11,color:"#98c379"}}>{doneCount}/{steps.length} done</span>}
      </div>

      {/* ── SIMULATOR ── */}
      {mainView==="simulator"&&(
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {/* left: endpoints */}
          <div style={{width:260,borderRight:`1px solid ${T.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
            <div style={{padding:"8px 8px 0",flexShrink:0}}>
              <div style={{fontSize:11,color:T.textDim,marginBottom:6,paddingLeft:2}}>ENDPOINTS</div>
              {simTabs.map(t=>(
                <button key={t} onClick={()=>setSimTab(t)}
                  style={{width:"100%",textAlign:"left",background:simTab===t?T.bgRaised:"transparent",
                    border:"none",borderLeft:`3px solid ${simTab===t?tabColor(t):"transparent"}`,
                    color:simTab===t?T.text:T.textDim,padding:"6px 10px",fontSize:12,cursor:"pointer",marginBottom:2,borderRadius:"0 4px 4px 0"}}>
                  <span style={{color:tabColor(t),marginRight:6,fontWeight:"bold"}}>{t.split(" ")[0]}</span>{t.split(" ")[1]}
                </button>
              ))}
            </div>
            <div style={{padding:"12px 10px",flex:1,overflowY:"auto"}}>
              {liveMode&&(
                <div style={{background:D?"#0d1f0d":"#f0fdf4",border:"1px solid #98c37944",borderRadius:5,padding:"7px 10px",marginBottom:10,fontSize:11,color:"#98c379",lineHeight:1.5}}>
                  🟢 <strong>Live mode</strong> — requests go to {liveUrl}
                </div>
              )}
              {liveMode&&liveStatus==="cors"&&(
                <div style={{background:D?"#2a1f00":"#fffbeb",border:"1px solid #e5c07b",borderRadius:6,padding:"10px",marginBottom:10,fontSize:11,lineHeight:1.6}}>
                  <div style={{color:"#e5c07b",fontWeight:"bold",marginBottom:4}}>⚠️ Server running but CORS is blocked</div>
                  <div style={{color:T.textDim,marginBottom:6}}>Your browser blocks requests from <code style={{background:T.bgMid,padding:"1px 4px",borderRadius:2}}>file://</code> to localhost unless FastAPI allows it.</div>
                  <div style={{color:T.text,marginBottom:4}}>Add this to the top of <code style={{color:"#98c379"}}>main.py</code>:</div>
                  <pre style={{margin:"0 0 6px",background:T.bgMid,padding:"6px 8px",borderRadius:4,fontSize:11,color:"#98c379",overflowX:"auto",whiteSpace:"pre"}}>{"from fastapi.middleware.cors import CORSMiddleware\n\napp.add_middleware(\n  CORSMiddleware,\n  allow_origins=['*'],\n  allow_methods=['*'],\n  allow_headers=['*'],\n)"}</pre>
                  <div style={{color:T.textDim}}>Then restart uvicorn and ping again.</div>
                </div>
              )}
              {liveMode&&liveStatus==="err"&&(
                <div style={{background:D?"#2a0d0d":"#fff5f5",border:"1px solid #e06c75",borderRadius:6,padding:"10px",marginBottom:10,fontSize:11,lineHeight:1.6}}>
                  <div style={{color:"#e06c75",fontWeight:"bold",marginBottom:4}}>❌ Server not found</div>
                  <div style={{color:T.textDim,marginBottom:4}}>Make sure you ran:</div>
                  <pre style={{margin:"0 0 6px",background:T.bgMid,padding:"6px 8px",borderRadius:4,fontSize:11,color:"#98c379"}}>uvicorn main:app --reload</pre>
                  <div style={{color:T.textDim}}>And that the URL matches (default: <code>http://localhost:8000</code>)</div>
                </div>
              )}
              {simTab==="GET /"&&(
                <div>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:8}}>Returns API status and book count.</div>
                  <div style={{background:T.bgMid,borderRadius:5,padding:"6px 8px",fontSize:11,color:T.textDim,marginBottom:10,fontFamily:"monospace"}}>GET {liveMode?liveUrl:""}/</div>
                  <button onClick={doGetRoot} style={{width:"100%",background:"#61afef",color:"#000",border:"none",borderRadius:5,padding:"7px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>▶ Send Request</button>
                </div>
              )}
              {simTab==="GET /books"&&(
                <div>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:8}}>Get all books or filter by category.</div>
                  <div style={{background:T.bgMid,borderRadius:5,padding:"6px 8px",fontSize:11,color:T.textDim,marginBottom:10,fontFamily:"monospace"}}>GET /books{filter?"?category="+filter:""}</div>
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:11,color:T.textDim,marginBottom:3}}>?category <span style={{color:T.textFnt}}>(optional)</span></div>
                    <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="e.g. tech, sci-fi"
                      style={{width:"100%",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"5px 8px",fontSize:12,color:T.text}}/>
                  </div>
                  <button onClick={doGet} style={{width:"100%",background:"#61afef",color:"#000",border:"none",borderRadius:5,padding:"7px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>▶ Send Request</button>
                </div>
              )}
              {simTab==="POST /books"&&(
                <div>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:8}}>Create a new book. All fields required.</div>
                  <div style={{background:T.bgMid,borderRadius:5,padding:"6px 8px",fontSize:11,color:T.textDim,marginBottom:10,fontFamily:"monospace"}}>POST /books</div>
                  <div style={{marginBottom:7}}>
                    <div style={{fontSize:11,color:T.textDim,marginBottom:3}}>title <span style={{color:"#e06c75"}}>*required</span></div>
                    <input ref={postTitleRef} defaultValue="" placeholder="e.g. Clean Code 2"
                      style={{width:"100%",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"5px 8px",fontSize:12,color:T.text}}/>
                  </div>
                  <div style={{marginBottom:7}}>
                    <div style={{fontSize:11,color:T.textDim,marginBottom:3}}>price <span style={{color:"#e06c75"}}>*required</span></div>
                    <input ref={postPriceRef} defaultValue="" placeholder="e.g. 24.99"
                      style={{width:"100%",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"5px 8px",fontSize:12,color:T.text}}/>
                  </div>
                  <div style={{marginBottom:7}}>
                    <div style={{fontSize:11,color:T.textDim,marginBottom:3}}>category <span style={{color:"#e06c75"}}>*required</span></div>
                    <input ref={postCategoryRef} defaultValue="" placeholder="e.g. tech"
                      style={{width:"100%",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"5px 8px",fontSize:12,color:T.text}}/>
                  </div>

                  <button onClick={doPost} style={{width:"100%",background:"#98c379",color:"#000",border:"none",borderRadius:5,padding:"7px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>▶ Send Request</button>
                </div>
              )}
              {simTab==="DELETE /books/{id}"&&(
                <div>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:8}}>Delete a book by ID. Returns 404 if not found.</div>
                  <div style={{background:T.bgMid,borderRadius:5,padding:"6px 8px",fontSize:11,color:T.textDim,marginBottom:10,fontFamily:"monospace"}}>DELETE /books/{deleteId||"{id}"}</div>
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:11,color:T.textDim,marginBottom:3}}>book_id <span style={{color:"#e06c75"}}>*required</span></div>
                    <input value={deleteId} onChange={e=>setDeleteId(e.target.value)} placeholder="e.g. 1"
                      style={{width:"100%",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"5px 8px",fontSize:12,color:T.text}}/>
                  </div>
                  {!liveMode&&<div style={{fontSize:11,color:T.textDim,marginBottom:8}}>Available IDs: {db.map(b=>b.id).join(", ")||"none"}</div>}
                  <button onClick={doDelete} style={{width:"100%",background:"#e06c75",color:"#000",border:"none",borderRadius:5,padding:"7px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>▶ Send Request</button>
                </div>
              )}
              {!liveMode&&(
                <div style={{marginTop:14,borderTop:`1px solid ${T.border}`,paddingTop:10}}>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:6}}>📦 LIVE DATABASE ({db.length} books)</div>
                  {db.map(b=>(
                    <div key={b.id} style={{background:T.bgMid,borderRadius:4,padding:"5px 7px",marginBottom:4,fontSize:11}}>
                      <span style={{color:"#e5c07b"}}>#{b.id}</span>
                      <span style={{color:T.text,marginLeft:6}}>{b.title}</span>
                      <span style={{color:"#98c379",marginLeft:6}}>${b.price}</span>
                      <span style={{color:T.textDim,marginLeft:6}}>[{b.category}]</span>
                    </div>
                  ))}
                  <button onClick={()=>{setDb(initDb());setLog([]);}}
                    style={{marginTop:4,background:"none",border:`1px solid ${T.border}`,borderRadius:4,color:T.textDim,padding:"3px 8px",fontSize:11,cursor:"pointer",width:"100%"}}>
                    ↺ Reset Database
                  </button>
                </div>
              )}
            </div>
          </div>
          {/* right: log */}
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"6px 12px",borderBottom:`1px solid ${T.border}`,fontSize:11,color:T.textDim,flexShrink:0,display:"flex",justifyContent:"space-between"}}>
              <span>⚡ Response Log {liveMode&&<span style={{color:"#98c379",marginLeft:4}}>— Live</span>}</span>
              {log.length>0&&<button onClick={()=>setLog([])} style={{background:"none",border:"none",color:T.textFnt,fontSize:11,cursor:"pointer"}}>Clear</button>}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:8}}>
              {log.length===0&&(
                <div style={{textAlign:"center",color:T.textFnt,fontSize:12,marginTop:40}}>
                  <div style={{fontSize:32,marginBottom:8}}>🚀</div>
                  <div>Select an endpoint and hit Send Request</div>
                  {liveMode&&<div style={{marginTop:8,fontSize:11,color:"#98c379"}}>Sending real requests to {liveUrl}</div>}
                </div>
              )}
              {log.map(e=><LogCard key={e.id} entry={e}/>)}
            </div>
          </div>
        </div>
      )}

      {/* ── TUTORIAL ── */}
      {mainView==="tutorial"&&(
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {/* left: code viewer */}
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",borderRight:`1px solid ${T.border}`}}>
            <div style={{padding:"8px 12px",borderBottom:`1px solid ${T.border}`,flexShrink:0,background:T.bgDeep}}>
              <div style={{fontSize:13,fontWeight:"bold",color:"#fb923c",marginBottom:3}}>{TUT_STEPS[tutStep].title}</div>
              <div style={{fontSize:11,color:T.textDim,lineHeight:1.6}}>{TUT_STEPS[tutStep].concept}</div>
            </div>
            {/* step pills */}
            <div style={{padding:"6px 10px",borderBottom:`1px solid ${T.border}`,flexShrink:0,display:"flex",gap:4}}>
              {TUT_STEPS.map((_,i)=>(
                <button key={i} onClick={()=>setTutStep(i)}
                  style={{background:tutStep===i?"#fb923c":T.bgRaised,color:tutStep===i?"#000":T.textDim,
                    border:"none",borderRadius:4,padding:"2px 8px",fontSize:11,cursor:"pointer",fontWeight:tutStep===i?"bold":"normal"}}>
                  {i+1}
                </button>
              ))}
            </div>
            {/* CodeMirror mount point — always in DOM when tutorial view is active */}
            <div ref={tutDivRef} style={{flex:1,overflow:"hidden",minHeight:0}}/>
            {/* hint */}
            <div style={{padding:"6px 12px",borderTop:`1px solid ${T.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:8,background:D?"#1a2030":"#f0f4ff"}}>
              <span style={{fontSize:16}}>💡</span>
              <span style={{fontSize:11,color:T.textDim,flex:1,lineHeight:1.5}}>{TUT_STEPS[tutStep].hint}</span>
            </div>
          </div>
          {/* right: request + log */}
          <div style={{width:280,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}}>
            <div style={{padding:"8px 12px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
              <div style={{fontSize:11,color:T.textDim,marginBottom:6}}>SEND REQUEST</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <span style={{color:methodColor(TUT_STEPS[tutStep].action.method),fontWeight:"bold",fontSize:12}}>{TUT_STEPS[tutStep].action.method}</span>
                <span style={{fontFamily:"monospace",fontSize:11,color:T.text,background:T.bgMid,padding:"2px 7px",borderRadius:4}}>{TUT_STEPS[tutStep].action.url}</span>
              </div>
              {(TUT_STEPS[tutStep].inputs||[]).map(inp=>(
                <div key={inp.key} style={{marginBottom:7}}>
                  <div style={{fontSize:11,color:T.textDim,marginBottom:3}}>{inp.key}</div>
                  <input value={tutInput[inp.key]||""} onChange={e=>{const v=e.target.value;setTutInput(x=>({...x,[inp.key]:v}))}} placeholder={inp.placeholder}
                    style={{width:"100%",background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:4,padding:"5px 8px",fontSize:12,color:T.text}}/>
                </div>
              ))}
              <button onClick={runTutStep}
                style={{width:"100%",background:"#fb923c",color:"#000",border:"none",borderRadius:5,padding:"7px",fontSize:12,fontWeight:"bold",cursor:"pointer",marginTop:4}}>
                ▶ Run — {TUT_STEPS[tutStep].action.label}
              </button>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:8}}>
              {tutLog.length===0&&(
                <div style={{textAlign:"center",color:T.textFnt,fontSize:11,marginTop:30}}>
                  <div style={{fontSize:28,marginBottom:6}}>👆</div>
                  Hit Run to see the response
                </div>
              )}
              {tutLog.map(e=><LogCard key={e.id} entry={e}/>)}
            </div>
            <div style={{padding:"8px 10px",borderTop:`1px solid ${T.border}`,display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>setTutStep(s=>Math.max(0,s-1))} disabled={tutStep===0}
                style={{flex:1,background:tutStep===0?T.bgRaised:T.bgMid,color:tutStep===0?T.textFnt:T.textDim,
                  border:`1px solid ${T.border}`,borderRadius:5,padding:"5px",fontSize:12,cursor:tutStep===0?"default":"pointer"}}>
                ← Prev
              </button>
              <button onClick={()=>setTutStep(s=>Math.min(TUT_STEPS.length-1,s+1))} disabled={tutStep===TUT_STEPS.length-1}
                style={{flex:1,background:tutStep===TUT_STEPS.length-1?"#98c37966":"#fb923c",
                  color:tutStep===TUT_STEPS.length-1?T.textFnt:"#000",
                  border:"none",borderRadius:5,padding:"5px",fontSize:12,fontWeight:"bold",cursor:tutStep===TUT_STEPS.length-1?"default":"pointer"}}>
                {tutStep===TUT_STEPS.length-1?"✅ Done":"Next →"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── RUN LOCALLY ── */}
      {mainView==="local"&&(
        <div style={{flex:1,overflowY:"auto",padding:16}}>
          <div style={{maxWidth:600,margin:"0 auto"}}>
            <div style={{fontSize:14,fontWeight:"bold",color:T.text,marginBottom:4}}>🏠 Run FastAPI on Your Machine</div>
            <div style={{fontSize:12,color:T.textDim,marginBottom:16,lineHeight:1.6}}>
              <code style={{background:T.bgMid,padding:"1px 5px",borderRadius:3,color:"#98c379",fontSize:11}}>main.py</code> is already in the GitHub repo — just clone and run.
              Once the server is up, switch to <strong>🖥 Simulator</strong> and toggle <strong>🟢 Live</strong> to send real HTTP requests.
            </div>
            {steps.map((step,i)=>{
              const done=checks[step.key];
              return (
                <div key={step.key} style={{display:"flex",gap:12,marginBottom:14}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                    <button onClick={()=>toggleCheck(step.key)}
                      style={{width:26,height:26,borderRadius:"50%",border:`2px solid ${done?"#98c379":"#fb923c"}`,
                        background:done?"#98c379":"transparent",color:done?"#000":"#fb923c",
                        fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>
                      {done?"✓":step.num}
                    </button>
                    {i<steps.length-1&&<div style={{width:2,flex:1,background:done?"#98c37944":T.border,marginTop:4}}/>}
                  </div>
                  <div style={{flex:1,paddingBottom:4}}>
                    <div style={{fontSize:13,fontWeight:"bold",color:done?"#98c379":T.text,marginBottom:4}}>{step.title}</div>
                    <div style={{fontSize:12,color:T.textDim,marginBottom:step.cmd||step.links.length?8:0,lineHeight:1.5}}>{step.body}</div>
                    {step.note&&(
                      <div style={{fontSize:11,color:"#98c379",background:D?"#0d1f0d":"#f0fdf4",border:"1px solid #98c37933",borderRadius:4,padding:"5px 8px",marginBottom:8}}>
                        ✅ {step.note}
                      </div>
                    )}
                    {step.cmd&&(
                      <div style={{display:"flex",alignItems:"center",gap:6,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 10px",marginBottom:step.cdCmd?6:0}}>
                        <code style={{flex:1,fontSize:12,color:"#98c379",fontFamily:"monospace"}}>{step.cmd}</code>
                        <button onClick={()=>copy2(step.cmd,step.key)}
                          style={{background:copied2===step.key?"#98c379":T.bgRaised,color:copied2===step.key?"#000":T.textDim,
                            border:"none",borderRadius:4,padding:"2px 7px",fontSize:11,cursor:"pointer",flexShrink:0}}>
                          {copied2===step.key?"✅":"📋"}
                        </button>
                      </div>
                    )}
                    {step.cdCmd&&(
                      <div style={{display:"flex",alignItems:"center",gap:6,background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 10px"}}>
                        <code style={{flex:1,fontSize:12,color:"#e5c07b",fontFamily:"monospace"}}>{step.cdCmd}</code>
                        <button onClick={()=>copy2(step.cdCmd,step.key+"cd")}
                          style={{background:copied2===step.key+"cd"?"#98c379":T.bgRaised,color:copied2===step.key+"cd"?"#000":T.textDim,
                            border:"none",borderRadius:4,padding:"2px 7px",fontSize:11,cursor:"pointer",flexShrink:0}}>
                          {copied2===step.key+"cd"?"✅":"📋"}
                        </button>
                      </div>
                    )}
                    {step.links.length>0&&(
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:step.cmd?8:0}}>
                        {step.links.map(l=>(
                          <a key={l.href} href={l.href} target="_blank" rel="noopener noreferrer"
                            style={{fontSize:12,color:"#61afef",textDecoration:"none",border:"1px solid #61afef44",borderRadius:5,padding:"4px 10px",background:T.bgMid}}>
                            {l.label}
                          </a>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
            {doneCount===steps.length&&(
              <div style={{background:"#98c37922",border:"1px solid #98c379",borderRadius:8,padding:"12px 16px",marginTop:8}}>
                <div style={{fontSize:13,color:"#98c379",fontWeight:"bold",marginBottom:4}}>🎉 Server is running!</div>
                <div style={{fontSize:12,color:T.textDim,marginBottom:10}}>Switch to the Simulator and toggle Live mode to send real HTTP requests to your server.</div>
                <button onClick={()=>{setMainView("simulator");setLiveMode(true);setLiveStatus(null);}}
                  style={{background:"#98c379",color:"#000",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,fontWeight:"bold",cursor:"pointer"}}>
                  → Open Simulator in Live mode
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    const src = cmRef.current ? cmRef.current.getValue() : code;
    if (!pyodideRef.current || !src.trim()) return;

    // ── Detect pip install lines ──────────────────────────
    const pipLines = src.split("\n").filter(l => /^#?\s*pip install\s+/i.test(l.trim()));
    const packages = pipLines.flatMap(l =>
      l.replace(/^#?\s*pip install\s+/i, "").trim().split(/\s+/)
    ).filter(Boolean);

    if (packages.length > 0) {
      for (const pkg of packages) {
        setPipStatus({pkg, status:"installing"});
        setOutput("📦 Installing " + pkg + " via micropip...");
        try {
          await pyodideRef.current.runPythonAsync("import micropip; await micropip.install('" + pkg + "')");

            "Here's exactly what to do — follow each step:\n\n" +

            "── STEP 2: Install the missing library ──────────\n" +
            "  Open Terminal (Mac) or Command Prompt (Windows).\n" +
            "  Type this and press Enter:\n\n" +
            "      pip install " + pkg + "\n\n" +
            "── STEP 3: Save your code to a file ─────────────\n" +
            "  Open a plain text editor (Notepad on Windows,\n" +
            "  TextEdit on Mac — set to plain text mode).\n" +
            "  Copy all the code from the editor above.\n" +
            "  Paste it in and save the file as:  lesson.py\n" +
            "  (Make sure it ends in .py, not .py.txt)\n\n" +
            "── STEP 4: Run your code ─────────────────────────\n" +
            "  In Terminal / Command Prompt, type:\n\n" +
            "      python lesson.py\n\n" +
            "  and press Enter. You should see the output!\n\n" +
            "💡 Ask the AI Tutor 💬 if you get stuck on any step."
          );
          setRunning(false);
          return;
        }
      }
    }

    // ── Run the code (skip comment pip lines) ──────────────
    setRunning(true);
    const cleanSrc = src.split("\n").map(l => /^#\s*pip install/i.test(l.trim()) ? "# " + l.trim() : l).join("\n");
    const pyWrapper = [
      "import sys",
      "from io import StringIO",
      "_buf = StringIO()",
      "sys.stdout = _buf",
      "sys.stderr = _buf",
      "try:",
      cleanSrc.split("\n").map(l => "    " + l).join("\n"),
      "except Exception as e:",
      "    print('\\u274c Error: ' + str(e))",
      "finally:",
      "    sys.stdout = sys.__stdout__",
      "    sys.stderr = sys.__stderr__",
    ].join("\n");

      await pyodideRef.current.runPythonAsync(pyWrapper);
      const result = pyodideRef.current.runPython("_buf.getvalue()");
      setOutput(result || "✅ Code ran successfully (no output)");

  /* ── CHAT ───────────────────────────────────────────── */
  const sendChat = async () => {
    if (!chatInput.trim() || chatLoading) return;
    const userMsg  = chatInput.trim();
    const history  = chatMessages;
    const lessonCtx = activeLesson ? `Current lesson: "${activeLesson.title}" - ${activeLesson.project}` : "No lesson active.";

          {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system_instruction:{parts:[{text:systemPrompt}]},contents:gMsgs,generationConfig:{maxOutputTokens:400}})});
        const d = await r.json(); if (d.error) throw new Error(d.error.message);
        reply = d?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
      } else if (openaiKey) {
        const r = await fetch("https://api.openai.com/v1/chat/completions",
          {method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${openaiKey}`},
           body:JSON.stringify({model:"gpt-4o-mini",max_tokens:400,messages:[{role:"system",content:systemPrompt},...msgs.map(m=>({role:m.role,content:m.text}))]})});
        const d = await r.json(); if (d.error) throw new Error(d.error.message);
        reply = d?.choices?.[0]?.message?.content || "No response";
      } else if (anthropicKey) {
        const r = await fetch("https://api.anthropic.com/v1/messages",
          {method:"POST",headers:{"Content-Type":"application/json","x-api-key":anthropicKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
           body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:400,system:systemPrompt,messages:msgs.map(m=>({role:m.role,content:m.text}))})});
        const d = await r.json(); if (d.error) throw new Error(d.error.message||d.error);
        reply = d?.content?.[0]?.text || "No response";
      }
      setChatMessages(p=>[...p,{role:"assistant",text:reply}]);
    } catch(e) { setChatMessages(p=>[...p,{role:"assistant",text:`❌ Error: ${e.message}`}]); }
    setChatLoading(false);
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}), 100);
  };

  /* ── RENDER ─────────────────────────────────────────── */
  return (
    <div style={{fontFamily:"'JetBrains Mono','Courier New',monospace",background:T.bg,height:"100vh",color:T.text,display:"flex",flexDirection:"column",transition:"background 0.2s,color 0.2s"}}>

      {/* ── HEADER ── */}
      <div style={{background:T.bgDeep,borderBottom:`1px solid ${T.border}`,padding:"7px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <span style={{fontSize:18,flexShrink:0}}>🐍</span>
          <div style={{minWidth:0}}>
            <div style={{fontSize:12,fontWeight:"bold",color:"#00D084",letterSpacing:1,whiteSpace:"nowrap"}}>PYTHON BOOTCAMP</div>
            <div className="hdr-sub" style={{fontSize:13,color:T.textFnt}}>Line-by-Line · Built-in Editor · Run in Browser</div>
          </div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
          <span style={{fontSize:12,color:pyReady?"#00D084":"#F59E0B",flexShrink:0}}>{pyReady?"🟢":"⏳"}</span>
          <button onClick={()=>setShowSettings(true)} style={{background:T.bgRaised,color:hasKey?"#00D084":"#F59E0B",border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 8px",fontSize:12,flexShrink:0}}>
            {hasKey?`⚙️ ${activeProvider} ✅`:"⚙️ Setup AI"}
          </button>
          <button onClick={()=>setTheme(D?"light":"dark")} style={{background:T.bgRaised,color:T.textDim,border:`1px solid ${T.border}`,borderRadius:5,padding:"3px 8px",fontSize:12,flexShrink:0}}>
            {D?"☀️":"🌙"}
          </button>
          <div title="Completed" style={{background:T.bgRaised,borderRadius:20,padding:"2px 8px",fontSize:12,color:"#00D084",flexShrink:0}}>{doneCount}/{totalLessons} ✅</div>
          <div title="Progress"  style={{background:T.bgRaised,borderRadius:20,padding:"2px 8px",fontSize:12,color:"#F59E0B",flexShrink:0}}>{pct}%</div>
          {doneCount>0 && (
            <button title="Reset progress" onClick={()=>{ if(window.confirm("Reset all lesson progress?")){ ["bc_phase","bc_lesson","bc_completed","bc_bestscore"].forEach(k=>localStorage.removeItem(k)); setActivePhaseRaw(0);setActiveLessonRaw(null);setCompletedRaw({});setBestScore(0);setQuiz({active:false,q:0,score:0,answered:null}); }}}
              style={{background:"transparent",color:T.textFnt,border:"none",fontSize:12,padding:"2px 4px"}}>🗑</button>
          )}
        </div>
      </div>

      {/* ── PROGRESS BAR ── */}
      <div style={{height:2,background:T.bgRaised,flexShrink:0}}>
        <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#00D084,#4ECDC4)",transition:"width 0.5s"}}/>
      </div>

      {/* ── TOP NAV ── */}
      <div style={{background:T.bgDeep,borderBottom:`1px solid ${T.border}`,padding:"5px 14px",display:"flex",gap:5,flexShrink:0}}>
        {[{id:"curriculum",label:"📚 Lessons"},{id:"cheatsheet",label:"📋 Cheat Sheet"},{id:"quiz",label:"🧠 Quiz"}].map(t=>(
          <button key={t.id} onClick={()=>{setView(t.id);setActiveLesson(null);}}
            style={{background:view===t.id?"#00D084":"transparent",color:view===t.id?"#000":T.textMut,border:`1px solid ${view===t.id?"#00D084":T.border}`,borderRadius:5,padding:"4px 10px",fontSize:12,fontWeight:view===t.id?"bold":"normal"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── BODY ── */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* SIDEBAR */}
        {view==="curriculum" && (
          <div className="sidebar" style={{width:180,borderRight:`1px solid ${T.border}`,overflowY:"auto",flexShrink:0,background:T.bgDeep}}>
            {curriculum.map((p,idx)=>(
              <div key={p.id}>
                <button onClick={()=>{setActivePhase(idx);setActiveLesson(null);}}
                  style={{width:"100%",background:activePhase===idx?T.bgRaised:"transparent",border:"none",borderLeft:`3px solid ${activePhase===idx?p.color:"transparent"}`,padding:"8px 10px",textAlign:"left",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:13}}>{p.icon}</span>
                  <div>
                    <div style={{fontSize:13,color:T.textMut}}>{p.phase}</div>
                    <div style={{fontSize:13,color:activePhase===idx?p.color:T.text,fontWeight:activePhase===idx?"bold":"normal"}}>{p.title}</div>
                  </div>
                </button>
                {activePhase===idx && p.lessons.map(l=>(
                  <button key={l.id} onClick={()=>{setActiveLesson(l);loadLessonCode(l);}}
                    style={{width:"100%",background:activeLesson?.id===l.id?T.border:"transparent",border:"none",padding:"5px 10px 5px 28px",textAlign:"left",display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:13}}>{completed[l.id]?"✅":"⬜"}</span>
                    <span style={{fontSize:12,color:activeLesson?.id===l.id?T.text:T.textDim,fontWeight:activeLesson?.id===l.id?"bold":"normal"}}>{l.title}</span>
                  </button>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* MAIN PANEL */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* PHASE OVERVIEW */}
          {view==="curriculum" && !activeLesson && (
            <div style={{padding:18,overflowY:"auto",flex:1,background:T.bg}}>
              <div style={{fontSize:16,fontWeight:"bold",color:phase.color,marginBottom:3}}>{phase.icon} {phase.phase}: {phase.title}</div>
              <div style={{fontSize:13,color:T.textMut,marginBottom:14}}>Select a lesson to begin →</div>
              <div className="phase-grid" style={{display:"grid",gap:10}}>
                {phase.lessons.map(l=>(
                  <div key={l.id} onClick={()=>{setActiveLesson(l);loadLessonCode(l);}}
                    style={{background:T.bgMid,border:`1px solid ${completed[l.id]?phase.color:T.border}`,borderRadius:8,padding:14,cursor:"pointer",transition:"border-color 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=phase.color}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=completed[l.id]?phase.color:T.border}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:"bold",color:T.text,marginBottom:2}}>{l.title}</div>
                        <div style={{fontSize:13,color:phase.color}}>{l.project}</div>
                      </div>
                      <span style={{fontSize:12,color:T.textMut,background:T.bgRaised,padding:"2px 7px",borderRadius:8,height:"fit-content",flexShrink:0}}>⏱ {l.duration}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {(l.concepts||[]).map(c=><span key={c} style={{background:T.bg,border:`1px solid ${phase.color}44`,color:phase.color,padding:"1px 5px",borderRadius:3,fontSize:13}}>{c}</span>)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* LESSON + EDITOR */}
          {view==="curriculum" && activeLesson && (
            <div className="lesson-wrap" style={{display:"flex",flex:1,overflow:"hidden"}}>

              {/* LEFT: Explanations */}
              <div className="lesson-pane" style={{flex:1,overflowY:"auto",minWidth:180,background:T.bg}}>
                <div style={{padding:"9px 12px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgDeep,flexShrink:0}}>
                  <div>
                    <button onClick={()=>setActiveLesson(null)} style={{background:"none",border:"none",color:T.textDim,fontSize:12,padding:0,marginBottom:2}}>← Back</button>
                    <div style={{fontSize:13,fontWeight:"bold",color:T.text}}>{activeLesson.title}</div>
                    <div style={{fontSize:13,color:phase.color}}>{activeLesson.project}</div>
                  </div>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    <button onClick={()=>setShowExp(!showExp)} style={{background:showExp?phase.color:T.bgRaised,color:showExp?"#000":T.textDim,border:"none",borderRadius:5,padding:"3px 7px",fontSize:13}}>
                      {showExp?"💡 ON":"💡 OFF"}
                    </button>
                    <button onClick={()=>setCompleted(p=>({...p,[activeLesson.id]:true}))}
                      style={{background:completed[activeLesson.id]?T.bgRaised:phase.color,color:completed[activeLesson.id]?T.textMut:"#000",border:"none",borderRadius:5,padding:"3px 7px",fontSize:13}}>
                      {completed[activeLesson.id]?"✅ Done":"Mark Done"}
                    </button>
                  </div>
                </div>
                <div style={{margin:"7px 10px",background:D?"#2d2a1e":"#fffbeb",border:"1px solid #F59E0B44",borderRadius:6,padding:"6px 10px"}}>
                  <div style={{color:"#F59E0B",fontSize:12,lineHeight:1.6}}>{activeLesson.memTrick}</div>
                </div>

                {/* AI lesson nudge — shown only if no key set */}
                {AI_LESSONS.includes(activeLesson.id) && !hasKey && (
                  <div style={{margin:"0 10px 10px",background:D?"#1e1a2e":"#f5f0ff",border:"1px solid #a855f7",borderRadius:6,padding:"10px 12px",display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:18,flexShrink:0}}>🔑</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:"bold",color:"#a855f7",marginBottom:2}}>API key required for this lesson</div>
                      <div style={{fontSize:11,color:T.textDim,lineHeight:1.5}}>This lesson makes live API calls. Add a free Gemini key to run the code — takes 30 seconds.</div>
                    </div>
                    <button onClick={()=>setShowSettings(true)}
                      style={{background:"#a855f7",color:"#fff",border:"none",borderRadius:5,padding:"5px 10px",fontSize:11,fontWeight:"bold",flexShrink:0,cursor:"pointer"}}>
                      ⚙️ Setup AI →
                    </button>
                  </div>
                )}

                {/* AI lesson provider badge — shown when key is set */}
                {AI_LESSONS.includes(activeLesson.id) && hasKey && (
                  <div style={{margin:"0 10px 10px",background:D?"#1a2e1a":"#f0fdf4",border:"1px solid #00D08444",borderRadius:6,padding:"7px 12px",display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:14}}>✅</span>
                    <div style={{fontSize:11,color:"#00D084"}}>
                      Code auto-configured for <strong>{activeProvider}</strong> — just hit ▶ Run
                    </div>
                  </div>
                )}
                <div style={{margin:"0 10px 12px"}}>
                  {activeLesson.lines.map((line,i)=>{
                    if(!line.code && line.exp===null) return <div key={i} style={{height:5}}/>;
                    const icon=line.exp?line.exp[0]:null;
                    const iconColor=ICON_COLORS[icon]||"#8b949e";
                    return (
                      <div key={i} style={{background:T.bgRaised,marginBottom:1,borderRadius:3,overflow:"hidden"}}>
                        <div style={{display:"flex"}}>
                          <div style={{width:24,flexShrink:0,padding:"6px 0",textAlign:"center",fontSize:13,color:T.textFnt,borderRight:`1px solid ${T.bg}`}}>{i+1}</div>
                          <div style={{flex:1,padding:"6px 8px"}}>
                            <pre style={{margin:0,fontSize:13,color:T.text,whiteSpace:"pre-wrap",lineHeight:1.5}}>{line.code||" "}</pre>
                            {showExp && line.exp && (
                              <div style={{marginTop:3,padding:"4px 7px",background:T.bg,borderRadius:3,borderLeft:`2px solid ${iconColor}`,display:"flex",gap:5}}>
                                <span style={{fontSize:13,flexShrink:0}}>{icon}</span>
                                <span style={{fontSize:12,color:T.textDim,lineHeight:1.6}}>{line.exp.slice(2)}</span>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* VERTICAL DIVIDER */}
              <div className="vdiv" onMouseDown={startVDrag}
                style={{width:5,background:T.border,cursor:"col-resize",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background=T.borderHv}
                onMouseLeave={e=>e.currentTarget.style.background=T.border}>
                <div style={{width:1,height:28,background:T.textFnt,borderRadius:1,pointerEvents:"none"}}/>
              </div>

              {/* RIGHT: Simulator or Editor */}
              {activeLesson.isSim ? <FastAPISim T={T} D={D} phase={phase}/> : (
              <div className="editor-pane" style={{width:editorWidth,display:"flex",flexDirection:"column",background:T.codeBg,flexShrink:0,minWidth:180}}>
                <div style={{padding:"6px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:T.bgDeep,flexShrink:0}}>
                  <div style={{fontSize:12,color:T.textDim}}>📝 Editor</div>
                  <div style={{display:"flex",gap:4}}>
                    <button onClick={()=>loadLessonCode(activeLesson)} style={{background:T.bgRaised,color:T.textDim,border:"none",borderRadius:4,padding:"2px 7px",fontSize:13}}>↺ Reset</button>
                    <button onClick={()=>copyCode(cmRef.current?cmRef.current.getValue():code,"editor")} style={{background:copied==="editor"?"#00D084":T.bgRaised,color:copied==="editor"?"#000":T.textDim,border:"none",borderRadius:4,padding:"2px 7px",fontSize:13}}>{copied==="editor"?"✅":"📋"}</button>
                    <button onClick={runCode} disabled={running||!pyReady}
                      style={{background:running?T.bgRaised:"#00D084",color:running?T.textDim:"#000",border:"none",borderRadius:4,padding:"2px 10px",fontSize:12,fontWeight:"bold",cursor:running||!pyReady?"not-allowed":"pointer"}}>
                      {running?"⏳":"▶ Run"}
                    </button>
                  </div>
                </div>

                {/* CodeMirror mount point */}
                <div ref={initCM} style={{flex:1,overflow:"hidden",minHeight:0}}/>

                {/* HORIZONTAL DIVIDER */}
                <div onMouseDown={startHDrag}
                  style={{height:5,background:T.border,cursor:"row-resize",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}
                  onMouseEnter={e=>e.currentTarget.style.background=T.borderHv}
                  onMouseLeave={e=>e.currentTarget.style.background=T.border}>
                  <div style={{height:1,width:28,background:T.textFnt,borderRadius:1,pointerEvents:"none"}}/>
                </div>

                {/* OUTPUT */}
                <div style={{height:outputHeight,display:"flex",flexDirection:"column",background:T.bgDeep,flexShrink:0,minHeight:60,position:"relative"}}>
                  <div style={{padding:"5px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
                    <div style={{fontSize:12,color:T.textDim}}>
                      {pipStatus?.status==="installing" ? "📦 Installing "+pipStatus.pkg+"..." : "⚡ Output"}
                    </div>
                    <button onClick={()=>setOutput("")} style={{background:"none",border:"none",color:T.textFnt,fontSize:13}}>Clear</button>
                  </div>
                  <div style={{flex:1,overflowY:"auto",padding:"8px 10px"}}>
                    {output
                      ? <pre style={{margin:0,fontSize:13,color:output.includes("❌")?"#fc8181":"#68d391",whiteSpace:"pre-wrap",lineHeight:1.6}}>{output}</pre>
                      : <div style={{color:T.textFnt,fontSize:12,fontStyle:"italic"}}>Click ▶ Run to see output…</div>}
                  </div>
                  {/* Corner grip */}
                  <div style={{position:"absolute",bottom:0,right:0,width:14,height:14,cursor:"nw-resize",opacity:0.4,display:"flex",alignItems:"flex-end",justifyContent:"flex-end",padding:2}}
                    onMouseDown={e=>{
                      e.preventDefault();
                      const sy=e.clientY,sh=outputHeight;
                      const mv=ev=>setOutputHeight(Math.max(60,Math.min(500,sh+(sy-ev.clientY))));
                      const up=()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
                      window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
                    }}>
                    <svg width="10" height="10" viewBox="0 0 10 10"><path d="M9 1L1 9M9 5L5 9" stroke="#94a3b8" strokeWidth="1.5" strokeLinecap="round"/></svg>
                  </div>
                </div>
              </div>
              )}
            </div>
          )}

          {/* CHEAT SHEET */}
          {view==="cheatsheet" && (
            <div style={{padding:18,overflowY:"auto",flex:1,background:T.bg}}>
              <div style={{fontSize:16,fontWeight:"bold",color:T.text,marginBottom:14}}>📋 Syntax Cheat Sheet — click any line to copy</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
                {[
                  {cat:"Variables",       items:['name = "Alice"',"age = 25","is_active = True","pi = 3.14"]},
                  {cat:"Print / f-strings",items:['print("text")','print(f"Hi {name}")', 'print("=" * 40)']},
                  {cat:"Lists",           items:["lst = [1,2,3]","lst.append(4)","lst[0]","len(lst)","lst[-1]"]},
                  {cat:"Dicts",           items:['d = {"k":"v"}','d["key"]','d.get("k",default)',"d.keys()","d.items()"]},
                  {cat:"Conditions",      items:["if x > 0:","elif x == 0:","else:","if a and b:","if a or b:"]},
                  {cat:"Loops",           items:["for item in list:","for i in range(5):","for k,v in d.items():","while condition:"]},
                  {cat:"Functions",       items:["def func(x, y=0):","    return x + y","result = func(5,3)"]},
                  {cat:"Classes",         items:["class Dog:","    def __init__(self,n):","        self.name = n","d = Dog('Rex')"]},
                  {cat:"Comprehensions",  items:["[x for x in lst]","[x for x in lst if x>0]","[x*2 for x in range(5)]"]},
                  {cat:"Error Handling",  items:["try:","    risky_code()","except ValueError as e:","    print(e)","finally:"]},
                  {cat:"Imports",         items:["import requests","from fastapi import FastAPI","import json"]},
                  {cat:"Strings",         items:["s.lower()","s.upper()","s.strip()",'s.split(",")','f"Hi {name}"']},
                ].map(sec=>(
                  <div key={sec.cat} style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden"}}>
                    <div style={{background:T.bgDeep,padding:"5px 10px",fontSize:12,fontWeight:"bold",color:"#00D084"}}>{sec.cat}</div>
                    <div style={{padding:7}}>
                      {sec.items.map((item,i)=>(
                        <div key={i} onClick={()=>copyCode(item,`cs-${sec.cat}-${i}`)}
                          style={{background:copied===`cs-${sec.cat}-${i}`?"#00D08422":T.bg,borderRadius:3,padding:"3px 7px",marginBottom:3,cursor:"pointer",display:"flex",justifyContent:"space-between"}}>
                          <code style={{fontSize:12,color:T.text}}>{item}</code>
                          <span style={{fontSize:13,color:T.textFnt}}>{copied===`cs-${sec.cat}-${i}`?"✅":"copy"}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* QUIZ */}
          {view==="quiz" && (
            <div style={{padding:18,overflowY:"auto",flex:1,background:T.bg}}>
              <div style={{maxWidth:480,margin:"0 auto"}}>
                <div style={{fontSize:16,fontWeight:"bold",color:T.text,marginBottom:3}}>🧠 Syntax Quiz</div>
                <div style={{fontSize:13,color:T.textMut,marginBottom:18}}>No peeking! Builds muscle memory. Do this every morning.</div>

                {!quiz.active && quiz.q===0 && (
                  <div style={{textAlign:"center",padding:36}}>
                    <div style={{fontSize:48,marginBottom:10}}>🧠</div>
                    <div style={{fontSize:14,color:T.text,marginBottom:6}}>{QUIZ.length} questions · Answer from memory</div>
                    {bestScore>0 && <div style={{fontSize:13,color:"#F59E0B",marginBottom:18}}>🏅 Best score: {bestScore}/{QUIZ.length}</div>}
                    {!bestScore && <div style={{height:18,marginBottom:18}}/>}
                    <button onClick={()=>setQuiz({active:true,q:0,score:0,answered:null})}
                      style={{background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"10px 24px",fontSize:12,fontWeight:"bold"}}>
                      Start Quiz →
                    </button>
                  </div>
                )}

                {quiz.active && quiz.q<QUIZ.length && (
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,fontSize:12,color:T.textMut}}>
                      <span>Q {quiz.q+1} of {QUIZ.length}</span><span>Score: {quiz.score}/{quiz.q} ✅</span>
                    </div>
                    <div style={{background:T.bgMid,border:`1px solid ${T.border}`,borderRadius:8,padding:14,marginBottom:10}}>
                      <div style={{fontSize:14,color:T.text,fontWeight:"bold"}}>{QUIZ[quiz.q].q}</div>
                    </div>
                    <div style={{display:"grid",gap:6}}>
                      {QUIZ[quiz.q].opts.map((opt,i)=>{
                        const correct=opt===QUIZ[quiz.q].a, answered=quiz.answered!==null, selected=quiz.answered===opt;
                        let bg=T.bgMid, border=T.border, color=T.text;
                        if(answered){if(correct){bg="#1a2e1a";border="#00D084";color="#00D084";}else if(selected){bg="#2e1a1a";border="#fc8181";color="#fc8181";}}
                        return (
                          <button key={i} disabled={answered}
                            onClick={()=>setQuiz(p=>({...p,answered:opt,score:opt===QUIZ[p.q].a?p.score+1:p.score}))}
                            style={{background:bg,border:`1px solid ${border}`,color,borderRadius:6,padding:"9px 12px",fontSize:13,cursor:answered?"default":"pointer",textAlign:"left"}}>
                            <code>{opt}</code>{answered&&correct&&" ✅"}{answered&&selected&&!correct&&" ❌"}
                          </button>
                        );
                      })}
                    </div>
                    {quiz.answered && (
                      <button onClick={()=>setQuiz(p=>({...p,q:p.q+1,answered:null}))}
                        style={{marginTop:9,background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"7px 16px",fontSize:13,fontWeight:"bold"}}>
                        {quiz.q+1<QUIZ.length?"Next →":"See Score →"}
                      </button>
                    )}
                  </div>
                )}

                {quiz.active && quiz.q>=QUIZ.length && (
                  <div style={{textAlign:"center",padding:36}}>
                    <div style={{fontSize:48,marginBottom:10}}>{quiz.score>=6?"🏆":quiz.score>=4?"💪":"📚"}</div>
                    <div style={{fontSize:22,color:"#00D084",fontWeight:"bold",marginBottom:5}}>{quiz.score}/{QUIZ.length}</div>
                    {quiz.score>bestScore && <div style={{fontSize:13,color:"#F59E0B",marginBottom:5}}>🎉 New best score!</div>}
                    {bestScore>0&&quiz.score<=bestScore && <div style={{fontSize:13,color:T.textMut,marginBottom:5}}>🏅 Best: {bestScore}/{QUIZ.length}</div>}
                    <div style={{fontSize:13,color:T.text,marginBottom:18}}>{quiz.score>=6?"Syntax locked in! 🔥":quiz.score>=4?"Getting there — retry!":"Keep at it — repetition = memory."}</div>
                    <button onClick={()=>{ const nb=Math.max(bestScore,quiz.score); if(nb>bestScore){setBestScore(nb);localStorage.setItem("bc_bestscore",nb);} setQuiz({active:true,q:0,score:0,answered:null}); }}
                      style={{background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"10px 24px",fontSize:12,fontWeight:"bold"}}>
                      Try Again →
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── SETTINGS MODAL ── */}
      {showSettings && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:14,padding:22,width:400,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontSize:15,fontWeight:"bold",color:T.text,marginBottom:3}}>⚙️ AI Tutor Setup</div>
            <div style={{fontSize:13,color:T.textMut,marginBottom:18}}>Enter one API key to power the chat tutor. Stored locally — never sent anywhere else.</div>

            {[
              {id:"gemini",    label:"🟢 Google Gemini",    color:"#00D084", badge:"⭐ FREE",         hint:`Go to aistudio.google.com → Get API Key. Free. Uses gemini-2.5-flash.`,           key:geminiKey,    ph:"Paste Gemini API key"},
              {id:"openai",    label:"🟦 OpenAI",           color:"#74aa9c", badge:"~$0.60/1M tokens", hint:`platform.openai.com → API Keys. Requires ~$5 credit. Uses gpt-4o-mini.`,        key:openaiKey,    ph:"Paste OpenAI API key (sk-...)"},
              {id:"anthropic", label:"🟠 Anthropic (Claude)",color:"#f472b6", badge:"~$0.80/1M tokens", hint:`console.anthropic.com → API Keys. Add $5 credit. Uses Claude Haiku.`,            key:anthropicKey, ph:"Paste Anthropic API key (sk-ant-...)"},
            ].map(p=>(
              <div key={p.id} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{fontSize:13,fontWeight:"bold",color:p.color}}>{p.label}</div>
                  <span style={{fontSize:13,background:`${p.color}22`,color:p.color,padding:"2px 7px",borderRadius:8,border:`1px solid ${p.color}44`}}>{p.badge}</span>
                </div>
                <input value={keyInput[p.id]} onChange={e=>{const v=e.target.value;setKeyInput(prev=>({...prev,[p.id]:v}))}}
                  placeholder={p.key?"✅ Saved — paste to update":p.ph}
                  style={{width:"100%",background:T.bgDeep,border:`1px solid ${p.key?`${p.color}66`:T.border}`,borderRadius:6,padding:"7px 10px",fontSize:13,color:T.text,fontFamily:"inherit",marginBottom:5}}/>
                <div style={{fontSize:12,color:T.textMut,background:T.bgDeep,borderRadius:5,padding:"6px 10px",borderLeft:`2px solid ${p.color}`}}>
                  💡 {p.hint}
                </div>
              </div>
            ))}

            {hasKey && (
              <div style={{fontSize:12,color:T.textMut,background:T.bgRaised,borderRadius:6,padding:"7px 10px",marginBottom:14,border:`1px solid ${T.border}`}}>
                🔄 <strong style={{color:T.textDim}}>Active:</strong> <span style={{color:"#00D084"}}>{activeProvider}</span> — priority: Gemini → OpenAI → Anthropic.
                {" "}<button onClick={()=>{if(window.confirm("Clear all API keys?")){["gemini_key","openai_key","anthropic_key"].forEach(k=>localStorage.removeItem(k));setGeminiKey("");setOpenaiKey("");setAnthropicKey("");}}}
                  style={{background:"none",border:"none",color:"#fc8181",fontSize:12,textDecoration:"underline",padding:0,cursor:"pointer"}}>Clear all keys</button>
              </div>
            )}

            <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowSettings(false)} style={{background:T.bgRaised,color:T.textDim,border:"none",borderRadius:6,padding:"7px 14px",fontSize:13}}>Cancel</button>
              <button onClick={saveKeys} style={{background:"#00D084",color:"#000",border:"none",borderRadius:6,padding:"7px 14px",fontSize:13,fontWeight:"bold"}}>Save Keys →</button>
            </div>
          </div>
        </div>
      )}

      {/* ── CHAT BUTTON ── */}
      <button onClick={()=>{ if(!hasKey){setShowSettings(true);}else{setChatOpen(o=>!o);} }}
        style={{position:"fixed",bottom:22,right:22,width:48,height:48,borderRadius:"50%",background:chatOpen?T.bgRaised:"#00D084",color:chatOpen?T.text:"#000",border:"none",fontSize:20,boxShadow:"0 4px 20px rgba(0,208,132,0.35)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {chatOpen?"✕":"💬"}
      </button>

      {/* ── CHAT PANEL ── */}
      {chatOpen && (
        <div style={{position:"fixed",bottom:82,right:22,width:320,height:430,background:T.bg,border:`1px solid ${T.border}`,borderRadius:14,display:"flex",flexDirection:"column",zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",overflow:"hidden"}}>
          <div style={{padding:"9px 13px",background:T.bgDeep,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{fontSize:15}}>🤖</span>
              <div>
                <div style={{fontSize:13,fontWeight:"bold",color:T.text}}>Python Tutor</div>
                <div style={{fontSize:12,color:T.textMut}}>{activeLesson?`On: ${activeLesson.title}`:"Ask me anything"}</div>
              </div>
            </div>
            <div style={{fontSize:13,color:T.textMut,background:T.bgRaised,padding:"2px 6px",borderRadius:5}}>via {activeProvider}</div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:10,display:"flex",flexDirection:"column",gap:7}}>
            {chatMessages.map((msg,i)=>(
              <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",background:msg.role==="user"?"#00D084":T.bgMid,color:msg.role==="user"?"#000":T.text,borderRadius:msg.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"7px 11px",fontSize:12,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                  {msg.text}
                </div>
              </div>
            ))}
            {chatLoading && <div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:T.bgMid,borderRadius:"12px 12px 12px 2px",padding:"7px 12px",fontSize:15}}>⏳</div></div>}
            <div ref={chatEndRef}/>
          </div>
          <div style={{padding:"7px 9px",borderTop:`1px solid ${T.border}`,display:"flex",gap:6,flexShrink:0}}>
            <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()}
              placeholder="Ask a Python question…"
              style={{flex:1,background:T.bgDeep,border:`1px solid ${T.border}`,borderRadius:7,padding:"7px 9px",fontSize:12,color:T.text,fontFamily:"inherit"}}/>
            <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()}
              style={{background:chatLoading||!chatInput.trim()?T.bgRaised:"#00D084",color:chatLoading||!chatInput.trim()?T.textMut:"#000",border:"none",borderRadius:7,padding:"7px 11px",fontSize:13,fontWeight:"bold",cursor:chatLoading||!chatInput.trim()?"not-allowed":"pointer"}}>
              →
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
